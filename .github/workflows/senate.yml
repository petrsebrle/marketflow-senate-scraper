name: senate-scrape

on:
  schedule:
    # Every 10 minutes. GitHub may delay during high load; treat as best-effort.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Backfill window (days)"
        required: false
        default: "30"

permissions:
  contents: read

concurrency:
  group: senate-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Opt into Node.js 24 ahead of GitHub's June 2026 forced switch.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run scraper
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
          HEADLESS: "true"
        run: python scraper.py
